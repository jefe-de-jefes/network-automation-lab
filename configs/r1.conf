frr version 9.1.2_git
frr defaults traditional
hostname FRR-Router-1
no ipv6 forwarding
!
interface eth0
 ip address 10.0.0.1/30
exit
!
interface eth1
 ip address 10.0.0.5/30
exit
!
interface eth2
 ip address 10.1.0.1/28
exit
!
router ospf
 network 10.0.0.0/30 area 0
 network 10.0.0.4/30 area 0
 network 10.1.0.0/28 area 0
exit
!
